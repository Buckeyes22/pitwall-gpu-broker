version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
    groups:
      production-dependencies:
        patterns:
          - "*"
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        patterns:
          - "*"
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
